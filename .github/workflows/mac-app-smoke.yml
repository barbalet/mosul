name: Mac App Smoke

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native-apps:
    name: Native Mac Apps
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run Mac app smoke
        shell: bash
        run: bash scripts/run_mac_smoke.sh
